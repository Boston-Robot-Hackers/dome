camera:
  ros__parameters:
    camera:
      i_pipeline_type: 'RGBD'         # RGBD required for RGB + spatial NN
      i_tf_camera_model: 'OAK-D-LITE'
      i_tf_camera_name: 'oak'
      i_tf_parent_frame: 'oak-d-base-frame'
      i_enable_ir: false              # IR projector off — significant power saving
      i_laser_dot_brightness: 0       # explicit zero
      i_floodlight_brightness: 0      # off (default, explicit)
      i_nn_type: spatial
      i_usb_speed: HIGH               # USB 2.0 — lower power than SUPER/SUPER_PLUS
    pipeline_gen:
      i_enable_imu: false
    left:
      i_resolution: 400P
      i_fps: 12.0                     # reduced from 30 — less compute and power
    right:
      i_resolution: 400P
      i_fps: 12.0
    stereo:
      i_width: 640
      i_height: 400
      i_subpixel: true               # required for accurate spatial NN depth
      i_lr_check: false
      i_publish_topic: true
      i_align_depth: true
      i_output_disparity: false
      i_output_depth: true
      i_depth_preset: HIGH_DENSITY   # less compute than HIGH_ACCURACY
      i_bilateral_sigma: 0           # filter off to save compute
      i_enable_temporal_filter: false
      i_enable_spatial_filter: false
      i_enable_speckle_filter: false
    rgb:
      i_fps: 12.0                    # match stereo FPS
      i_enable_preview: true         # needed by spatial_bb_node
      i_keep_preview_aspect_ratio: false
      i_set_isp_scale: true
      i_isp_num: 2
      i_isp_den: 3                   # downscale RGB to reduce processing
    nn:
      i_nn_config_path: depthai_ros_driver/yolo
      i_enable_passthrough: true
      i_disable_resize: true
      i_num_inference_threads: 1     # reduced from 2 — less power
      i_num_pool_frames: 2           # smaller buffer

